<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>
(function() {
  const PIN = '160724';
  const KEY = 'gandela_auth';
  const SESSION_HOURS = 24;
  function isAuthed() {
    const d = localStorage.getItem(KEY);
    if (!d) return false;
    try { return Date.now() - JSON.parse(d).ts < SESSION_HOURS * 3600000; } catch { return false; }
  }
  if (!isAuthed()) {
    document.addEventListener('DOMContentLoaded', function() {
      const overlay = document.createElement('div');
      overlay.id = 'pin-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:#100d0e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:0;font-family:Inter,sans-serif';
      overlay.innerHTML = `
        <div style="font-family:Inter,sans-serif;font-size:30px;font-weight:700;letter-spacing:0.14em;color:#d4b06a;text-transform:uppercase;margin-bottom:6px">Gandela</div>
        <div style="font-size:11px;font-weight:500;letter-spacing:0.22em;color:#9a7d63;text-transform:uppercase;margin-bottom:48px">Watch Collection</div>
        <div style="display:flex;gap:14px;margin-bottom:32px" id="pin-dots">
          ${[0,1,2,3,4,5].map(i=>`<div id="dot-${i}" style="width:10px;height:10px;border-radius:50%;background:#2e2425;transition:background 0.15s"></div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,72px);gap:12px">
          ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`
            <button onclick="pinKey('${k}')" style="width:72px;height:72px;border-radius:50%;background:${k===''?'transparent':'#1c1718'};border:${k===''?'none':'0.5px solid #2e2425'};color:#f2e9e0;font-size:23px;font-weight:500;font-family:Inter,sans-serif;cursor:${k===''?'default':'pointer'};transition:background 0.15s"
            ${k===''?'disabled':''} onmousedown="this.style.background='#2a2122'" onmouseup="this.style.background='#1c1718'">${k}</button>`).join('')}
        </div>
        <div id="pin-error" style="color:#cf4136;font-size:12px;margin-top:20px;opacity:0;transition:opacity 0.2s">PIN incorrecto</div>`;
      document.body.appendChild(overlay);
      window._pinEntry = '';
      window.pinKey = function(k) {
        if (k === '') return;
        if (k === '⌫') { window._pinEntry = window._pinEntry.slice(0,-1); }
        else if (window._pinEntry.length < 6) { window._pinEntry += k; }
        const dots = document.querySelectorAll('[id^="dot-"]');
        dots.forEach((d,i) => d.style.background = i < window._pinEntry.length ? '#d4b06a' : '#2e2425');
        if (window._pinEntry.length === 6) {
          if (window._pinEntry === PIN) {
            localStorage.setItem(KEY, JSON.stringify({ts: Date.now()}));
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.3s';
            setTimeout(() => overlay.remove(), 300);
          } else {
            document.getElementById('pin-error').style.opacity = '1';
            setTimeout(() => {
              window._pinEntry = '';
              dots.forEach(d => d.style.background = '#2e2425');
              document.getElementById('pin-error').style.opacity = '0';
            }, 800);
          }
        }
      };
    });
  }
})();
</script>

<style>
  :root {
    --bg: #100d0e;
    --bg2: #1c1718;
    --bg3: #2a2122;
    --border: #2a2122;
    --border2: #3a2e2f;
    --gold: #d4b06a;
    --gold-light: #e6c88a;
    --rose: #b13036;
    --rose-dark: #8f2429;
    --text: #f2e9e0;
    --text2: #cdbcac;
    --text3: #b0a59c;
    --text4: #a18a76;
    --text5: #6e5a50;
    --green: #7aab6e;
    --red: #cf4136;
    --radius: 16px;
    --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; overflow: hidden; }

  /* ── APP SHELL ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }

  /* ── SCREENS ── */
  .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── TOPBAR ── */
  .topbar {
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-brand {
    font-family: 'Inter', sans-serif;
    font-size: 21px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--gold); text-transform: uppercase;
  }
  .topbar-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 20px; cursor: pointer; border-radius: 50%; transition: background 0.15s; }
  .topbar-icon:hover { background: var(--bg3); }
  .topbar-back { display: flex; align-items: center; gap: 6px; color: var(--gold); font-size: 13px; cursor: pointer; }
  .topbar-back i { font-size: 18px; }

  /* ── SCROLLABLE BODY ── */
  .scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    display: flex; border-top: 0.5px solid var(--border);
    padding: 10px 10px calc(var(--safe-bottom) + 10px);
    flex-shrink: 0; background: var(--bg); gap: 8px;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 6px 9px; cursor: pointer; color: var(--text4);
    font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; gap: 5px;
    border-radius: 14px; background: transparent;
    transition: all 0.18s;
  }
  .nav-item i { font-size: 22px; }
  .nav-item.active {
    background: var(--rose);
    color: #f5ece6;
  }

  .dash-hero-scrim { position: absolute; inset: 0; background: rgba(10,8,9,0.42); }
  .dash-hero-content { position: relative; z-index: 2; height: 100%;
    padding: calc(var(--safe-top) + 24px) 22px 18px; display: flex; align-items: flex-end; justify-content: space-between; }
  .hero-brand { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 0.13em; color: var(--gold); text-transform: uppercase; line-height: 1; }
  .hero-sub { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; color: #c2a079; text-transform: uppercase; margin-top: 5px; }
  .hero-add { width: 42px; height: 42px; border-radius: 50%; background: var(--rose); display: flex; align-items: center; justify-content: center; color: #f5ece6; font-size: 23px; cursor: pointer; flex-shrink: 0; }
  .hero-add:active { transform: scale(0.93); }
  .dash-body { padding: 20px 18px 24px; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .kpi-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
  .kpi-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text4); margin-bottom: 8px; }
  .kpi-value { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 600; line-height: 1; white-space: nowrap; }
  .kpi-value.gold { color: var(--gold); }
  .kpi-value.rose { color: var(--rose); }
  .kpi-value.green { color: var(--green); }
  .kpi-delta { font-size: 10px; color: var(--green); margin-top: 4px; }
  .section-title {
    font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gold); margin: 22px 0 13px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

  /* ── BRAND BARS ── */
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bar-label { width: 62px; font-size: 11px; color: var(--text3); text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--gold); }
  .bar-count { font-size: 11px; color: var(--text5); width: 18px; text-align: right; flex-shrink: 0; }

  /* ── DONUT ── */
  .axis-tabs { display: flex; gap: 6px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 14px; }
  .axis-tab { flex: 1; text-align: center; padding: 10px 4px; font-size: 13px; font-weight: 500; letter-spacing: 0.02em; color: var(--text3); border-radius: 9px; cursor: pointer; transition: all 0.15s; }
  .axis-tab.active { background: var(--gold); color: #2e2109; font-weight: 600; }
  .axis-panel { margin-bottom: 4px; }
  .donut-row { display: flex; gap: 16px; align-items: center; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── STATUS PILLS ── */
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .status-pill { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .status-label { font-size: 11px; color: var(--text3); }
  .status-num { margin-left: auto; font-family: 'Inter', sans-serif; font-size: 19px; font-weight: 600; color: var(--text); }

  /* ── COLLECTION GRID ── */
  .coll-header { padding: 16px 18px 8px; }
  .coll-hero { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 700; line-height: 1.15; letter-spacing: -0.01em; }
  .coll-hero em { font-style: normal; color: var(--gold); }
  .coll-sub { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text4); margin-top: 7px; }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 8px; padding: 10px 18px; overflow-x: auto; flex-shrink: 0; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 11px; letter-spacing: 0.06em; border: 0.5px solid var(--border2); color: var(--text4); background: transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .filter-chip.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

  /* ── WATCH GRID ── */
  .watch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 4px 18px 100px; }
  .watch-card {
    background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius);
    padding: 12px 12px 14px; cursor: pointer; transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .watch-card:active { transform: scale(0.97); }
  .watch-card:hover { border-color: var(--border2); }
  .card-name { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 700; line-height: 1.1; color: var(--text); text-align: center; }
  .card-model { font-size: 11px; font-weight: 400; color: var(--text3); text-align: center; margin-top: 2px; }
  .card-price { font-size: 13px; font-weight: 600; color: var(--red); text-align: center; margin-top: 4px; margin-bottom: 10px; }
  .card-photo {
    aspect-ratio: 1; border-radius: 10px;
    background: radial-gradient(circle at 50% 38%, #38292c 0%, #1c1517 75%);
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .card-photo .no-photo { color: var(--text5); font-size: 28px; }
  .card-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 20px; font-weight: 500;
  }
  .badge-venta { background: rgba(201,160,99,0.15); color: #e0b48f; border: 0.5px solid rgba(201,160,99,0.4); }
  .badge-guardado { background: rgba(90,69,72,0.3); color: var(--text3); border: 0.5px solid var(--text5); }
  .badge-vendido { background: rgba(122,107,110,0.2); color: var(--text4); border: 0.5px solid var(--text5); }
  .card-fav { position: absolute; bottom: 10px; left: 10px; width: 26px; height: 26px; border-radius: 50%; background: rgba(26,20,22,0.8); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; color: var(--text5); font-size: 13px; transition: color 0.15s; }
  .card-fav.on { color: var(--rose); }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: calc(70px + var(--safe-bottom) + 16px); right: 20px;
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--rose);
    border: none; color: #f5ece6; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 0 0 6px rgba(224,180,160,0.1);
    transition: transform 0.15s;
    z-index: 100;
  }
  .fab:active { transform: scale(0.93); }

  /* ── DETAIL SCREEN ── */
  .detail-photo {
    margin: 0 18px 0;
    aspect-ratio: 1.05; border-radius: 18px;
    background: radial-gradient(circle at 50% 36%, #3a2a2d 0%, #1c1517 78%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .detail-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
  .detail-photo .no-photo-lg { color: var(--text5); font-size: 60px; }
  .detail-fav { position: absolute; bottom: 14px; left: 14px; width: 32px; height: 32px; border-radius: 50%; background: rgba(26,20,22,0.85); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; color: var(--rose); font-size: 15px; cursor: pointer; }
  .photo-dots { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
  .photo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text5); }
  .photo-dot.on { background: var(--rose); width: 14px; border-radius: 3px; }

  .detail-body { padding: 20px 20px 120px; }
  .detail-name { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 700; line-height: 1.12; letter-spacing: -0.01em; }
  .detail-price { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; color: var(--gold); margin-top: 6px; }
  .detail-market { font-size: 11px; color: var(--text4); margin-top: 3px; }
  .detail-market b { color: var(--rose); font-weight: 500; }
  .detail-story { font-size: 13px; line-height: 1.7; color: var(--text3); margin-top: 16px; }
  .spec-row { display: flex; justify-content: space-between; padding: 9px 0; font-size: 12px; border-bottom: 0.5px solid #241c1f; }
  .spec-k { color: var(--text4); }
  .spec-v { color: var(--text2); font-weight: 500; }

  /* ── TIMELINE ── */
  .tl-item { display: flex; gap: 12px; padding: 8px 0; }
  .tl-dot-wrap { display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 4px; }
  .tl-line { flex: 1; width: 1px; background: var(--border2); min-height: 20px; margin-top: 4px; }
  .tl-date { font-size: 10px; color: var(--text4); }
  .tl-text { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .tl-text b { color: var(--rose); font-weight: 500; }

  /* ── STATUS SELECTOR ── */
  .status-sel { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .status-btn { padding: 6px 14px; border-radius: 20px; font-size: 11px; border: 0.5px solid var(--border2); color: var(--text4); background: transparent; cursor: pointer; transition: all 0.15s; }
  .status-btn.sel-uso { border-color: var(--green); color: var(--green); background: rgba(122,171,110,0.1); }
  .status-btn.sel-guardado { border-color: var(--text5); color: var(--text3); background: rgba(90,69,72,0.15); }
  .status-btn.sel-venta { border-color: var(--gold); color: var(--gold); background: rgba(201,160,99,0.1); }
  .status-btn.sel-vendido { border-color: var(--text5); color: var(--text5); background: rgba(90,69,72,0.1); }

  /* ── DETAIL ACTIONS ── */
  .detail-actions {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 14px 18px calc(var(--safe-bottom) + 16px);
    background: linear-gradient(180deg, transparent, var(--bg) 35%);
    display: flex; gap: 10px; z-index: 50;
  }
  .action-btn { flex: 1; padding: 14px; border-radius: 30px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; border: none; font-family: 'Inter', sans-serif; transition: opacity 0.15s; }
  .action-btn:active { opacity: 0.75; }
  .action-ghost { background: transparent; border: 0.5px solid var(--border2); color: var(--rose); }
  .action-solid { background: var(--rose); color: #f5ece6; }

  /* ── MODAL / FORM ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--bg2); border-radius: 24px 24px 0 0;
    width: 100%; max-height: 90vh; overflow-y: auto;
    padding: 0 0 calc(var(--safe-bottom) + 20px);
    border-top: 0.5px solid var(--border2);
  }
  .modal-sheet::-webkit-scrollbar { display: none; }
  .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border2); margin: 12px auto 6px; }
  .modal-title { font-family: 'Inter', sans-serif; font-size: 19px; font-weight: 700; padding: 8px 20px 16px; color: var(--text); border-bottom: 0.5px solid var(--border); }
  .form-body { padding: 16px 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg3); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); padding: 12px 14px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.15s;
    -webkit-appearance: none; appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
  .form-textarea { min-height: 80px; resize: none; line-height: 1.5; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-submit { width: 100%; padding: 15px; border-radius: 30px; background: var(--rose); color: #f5ece6; font-size: 15px; font-weight: 600; border: none; cursor: pointer; margin-top: 8px; font-family: 'Inter', sans-serif; }
  .photo-upload { width: 100%; aspect-ratio: 2; border: 0.5px dashed var(--border2); border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: var(--text4); font-size: 12px; }
  .photo-upload i { font-size: 28px; color: var(--text5); }
  .photo-upload input { display: none; }

  /* ── WISHLIST ── */
  .wish-list { padding: 8px 18px 100px; }
  .wish-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.15s; }
  .wish-card:hover { border-color: var(--border2); }
  .wish-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--text5); font-size: 20px; flex-shrink: 0; }
  .wish-name { font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); }
  .wish-target { font-size: 11px; color: var(--gold); margin-top: 2px; }
  .wish-notes { font-size: 11px; color: var(--text4); margin-top: 2px; }
  .wish-arrow { margin-left: auto; color: var(--text5); font-size: 18px; }

  /* ── VENTAS ── */
  .ventas-list { padding: 8px 18px 100px; }
  .venta-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .venta-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .venta-name { font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 700; }
  .venta-gain { font-size: 13px; font-weight: 500; }
  .venta-gain.pos { color: var(--green); }
  .venta-gain.neg { color: var(--red); }
  .venta-meta { font-size: 11px; color: var(--text4); margin-top: 4px; }
  .ventas-summary { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin: 0 18px 16px; }
  .vs-title { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text4); margin-bottom: 8px; }
  .vs-value { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 600; color: var(--green); }

  /* ── EMPTY STATE ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 30px; text-align: center; gap: 12px; }
  .empty-state i { font-size: 48px; color: var(--text5); }
  .empty-state h3 { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; color: var(--text3); }
  .empty-state p { font-size: 13px; color: var(--text4); line-height: 1.6; }

  /* ── TOAST ── */
  .toast { position: fixed; top: calc(var(--safe-top) + 60px); left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 20px; padding: 10px 18px; font-size: 13px; color: var(--text2); opacity: 0; transition: all 0.25s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<script>
// ══════════════════════════════════════════
// DATA LAYER
// ══════════════════════════════════════════
function loadData(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function saveData(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

let watches = loadData('gandela_watches', []);
let wishlist = loadData('gandela_wish', []);
let currentWatchId = null;
let editingWatchId = null;
let currentFilter = 'all';
let pendingPhotoData = null;

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function showScreen(name, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'dash') renderDash();
  if (name === 'coll') renderCollection();
  if (name === 'wish') renderWishlist();
  if (name === 'ventas') renderVentas();
}

function showDetail(id) {
  currentWatchId = id;
  renderDetail(id);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-detail').classList.add('active');
  document.getElementById('detail-scroll').scrollTop = 0;
}

function goBack() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-coll').classList.add('active');
  renderCollection();
}

// ══════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════
function renderDash() {
  const active = watches.filter(w => w.status !== 'vendido');
  const totalInvested = active.reduce((s, w) => s + (Number(w.price) || 0), 0);
  const totalValue = active.reduce((s, w) => s + (Number(w.value) || Number(w.price) || 0), 0);
  const sold = watches.filter(w => w.status === 'vendido');
  const gainRealized = sold.reduce((s, w) => s + ((Number(w.soldPrice) || 0) - (Number(w.price) || 0)), 0);
  const latent = totalValue - totalInvested;

  const uso = watches.filter(w => w.status === 'uso').length;
  const guardado = watches.filter(w => w.status === 'guardado').length;
  const venta = watches.filter(w => w.status === 'venta').length;
  const vendido = watches.filter(w => w.status === 'vendido').length;

  function buildMap(field) {
    const m = {};
    active.forEach(w => { const k = (w[field] && w[field].length) ? w[field] : 'Sin clasificar'; m[k] = (m[k]||0)+1; });
    return m;
  }
  const styleMap = buildMap('axStyle');
  const originMap = buildMap('axOrigin');
  const movMap = buildMap('axMov');

  document.getElementById('dash-body').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Invertido</div>
        <div class="kpi-value">${totalInvested > 0 ? fmt(totalInvested) : '—'}</div>

function donutHTML(map, total) {
  const C = 125.7;
  const colors = ['#b13036','#d4b06a','#9498a0','#cf4136','#7d663f','#a85a4a','#5e6168'];
  const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const t = total || 1;
  let offset = 0;
  const arcs = entries.map(([name,count],i)=>{ const dash=(count/t)*C; const a={name,count,dash,offset,color:colors[i%colors.length]}; offset+=dash; return a; });
  return `<div class="donut-row">
    <svg width="84" height="84" viewBox="0 0 84 84" style="flex-shrink:0">
      <circle cx="42" cy="42" r="20" fill="none" stroke="#2b2226" stroke-width="14"/>
      ${arcs.map(a=>`<circle cx="42" cy="42" r="20" fill="none" stroke="${a.color}" stroke-width="14" stroke-dasharray="${a.dash.toFixed(1)} ${(C-a.dash).toFixed(1)}" stroke-dashoffset="${(-a.offset + C/4).toFixed(1)}"/>`).join('')}
      <text x="42" y="47" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" fill="#f2e9e0">${total}</text>
    </svg>
    <div class="donut-legend">
      ${arcs.map(a=>`<div class="legend-item"><div class="legend-dot" style="background:${a.color}"></div>${a.name} · ${a.count} (${Math.round(a.count/t*100)}%)</div>`).join('')}
    </div>
  </div>`;
}

function switchAxis(which, el) {
  document.querySelectorAll('.axis-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['style','origin','mov'].forEach(a=>{
    document.getElementById('axis-'+a).style.display = (a===which) ? 'block' : 'none';
  });
}

function renderCollection() {

  document.getElementById('watch-grid').innerHTML = filtered.map(w => `
    <div class="watch-card" onclick="showDetail('${w.id}')">

// filter chips
document.getElementById('filter-bar').addEventListener('click', e => {

function toggleFav(id) {

}

function renderDetail(id) {
  const w = watches.find(w => w.id === id);
  if (!w) return;
  const latent = (Number(w.value) || 0) - (Number(w.price) || 0);

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-photo">
      ${w.photo ? `<img src="${w.photo}" alt="${w.model}">` : `<i class="ti ti-watch detail-no-photo" style="color:var(--text5);font-size:64px"></i>`}
      <div class="detail-fav" onclick="toggleFav('${w.id}')"><i class="ti ti-heart" style="color:${w.fav ? 'var(--rose)' : 'var(--text4)'}"></i></div>
    </div>
    <div class="detail-body">
      <div class="detail-name">${w.brand || ''}<br>${w.model || ''}</div>
      ${w.price ? `<div class="detail-price">${fmt(w.price)}</div>` : ''}
      ${w.valueRange ? `<div class="detail-market">Mercado estimado: <b>${w.valueRange} €</b></div>` : (w.value ? `<div class="detail-market">Valor estimado: <b>${fmt(w.value)}</b></div>` : '')}
      ${Number(w.price) > 0 && w.value && latent !== 0 ? `<div class="detail-market">${latent >= 0 ? '↑' : '↓'} ${fmt(Math.abs(latent))} (${latent >= 0 ? '+' : ''}${Math.round(latent/Number(w.price)*100)}%) vs compra</div>` : ''}

      ${w.notes ? `<div class="detail-story">${w.notes}</div>` : ''}

      <div class="section-title" style="margin-top:20px">Especificaciones</div>
      ${w.ref ? `<div class="spec-row"><span class="spec-k">Referencia</span><span class="spec-v">${w.ref}</span></div>` : ''}
      ${w.movement ? `<div class="spec-row"><span class="spec-k">Movimiento</span><span class="spec-v">${w.movement}</span></div>` : ''}
      ${w.size ? `<div class="spec-row"><span class="spec-k">Diámetro</span><span class="spec-v">${w.size} mm</span></div>` : ''}
      ${w.crystal ? `<div class="spec-row"><span class="spec-k">Cristal</span><span class="spec-v">${w.crystal}</span></div>` : ''}
      ${w.water ? `<div class="spec-row"><span class="spec-k">Estanqueidad</span><span class="spec-v">${w.water}</span></div>` : ''}
      ${w.strap ? `<div class="spec-row"><span class="spec-k">Correa</span><span class="spec-v">${w.strap}</span></div>` : ''}
      ${w.year ? `<div class="spec-row"><span class="spec-k">Año</span><span class="spec-v">${w.year}</span></div>` : ''}

      ${w.origin ? `
      <div class="section-title">Mi historia</div>
      <div class="tl-item">
        <div class="tl-dot-wrap"><div class="tl-dot"></div><div class="tl-line"></div></div>
        <div><div class="tl-date">Adquisición</div><div class="tl-text">${w.origin}</div></div>
      </div>` : ''}
      ${w.status === 'vendido' && w.soldPrice ? `
      <div class="tl-item">
        <div class="tl-dot-wrap"><div class="tl-dot" style="background:var(--rose)"></div></div>
        <div><div class="tl-date">${w.soldDate || 'Vendido'}</div><div class="tl-text">Vendido por <b>${fmt(w.soldPrice)}</b></div></div>
      </div>` : ''}
    </div>`;

  document.getElementById('detail-actions').innerHTML = `
    <button class="action-btn action-ghost" onclick="changeStatus('${w.id}')">
      <i class="ti ti-refresh" style="margin-right:6px"></i>Estado: ${statusLabel(w.status)}
    </button>
    <button class="action-btn action-solid" onclick="editCurrentWatch()">Editar ficha</button>`;
}

function statusLabel(s) {
  return { uso: 'En uso', guardado: 'Guardado', venta: 'En venta', vendido: 'Vendido' }[s] || s;
}

function changeStatus(id) {
  const w = watches.find(w => w.id === id);
  if (!w) return;
  const order = ['uso', 'guardado', 'venta', 'vendido'];
  const idx = order.indexOf(w.status);
  w.status = order[(idx + 1) % order.length];
  saveData('gandela_watches', watches);
  renderDetail(id);
  showToast(`Estado → ${statusLabel(w.status)}`);
}

function renderWishlist() {
  document.getElementById('wish-sub').textContent = `${wishlist.length} ${wishlist.length === 1 ? 'pieza' : 'piezas'}`;
  if (wishlist.length === 0) {
    document.getElementById('wish-list').innerHTML = `
      <div class="empty-state">
        <i class="ti ti-heart"></i>
        <h3>Tu wishlist está vacía</h3>
        <p>Añade relojes que quieras<br>conseguir algún día.</p>
      </div>`;
    return;
  }
  document.getElementById('wish-list').innerHTML = wishlist.map(w => `
    <div class="wish-card">
      <div class="wish-icon"><i class="ti ti-watch"></i></div>
      <div style="flex:1;min-width:0">
        <div class="wish-name">${w.brand} ${w.model}</div>
        ${w.ref ? `<div class="wish-notes">${w.ref}</div>` : ''}
        ${w.target ? `<div class="wish-target">Objetivo: ${fmt(w.target)}</div>` : ''}
        ${w.notes ? `<div class="wish-notes">${w.notes}</div>` : ''}

      <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
        <div class="topbar-icon" onclick="moveWishToCollection('${w.id}')" title="Mover a colección" style="font-size:16px;color:var(--green)"><i class="ti ti-circle-plus"></i></div>

}

function moveWishToCollection(id) {
  const w = wishlist.find(w => w.id === id);
  if (!w) return;
  wishlist = wishlist.filter(w => w.id !== id);
  saveData('gandela_wish', wishlist);
  // pre-fill add watch form with wish data
  openAddWatch();
  setTimeout(() => {
    document.getElementById('f-brand').value = w.brand || '';
    document.getElementById('f-model').value = w.model || '';
    document.getElementById('f-ref').value = w.ref || '';
    document.getElementById('f-notes').value = w.notes || '';
  }, 100);
  renderWishlist();
  showToast('Rellena los datos de compra');
}

function deleteWish(id) {
  wishlist = wishlist.filter(w => w.id !== id);
  saveData('gandela_wish', wishlist);
  renderWishlist();
  showToast('Eliminado de la wishlist');
}

// VENTAS
// ══════════════════════════════════════════
function renderVentas() {
  const sold = watches.filter(w => w.status === 'vendido');
  const totalGain = sold.reduce((s, w) => s + ((Number(w.soldPrice)||0) - (Number(w.price)||0)), 0);

  let html = `
    <div class="ventas-summary">
      <div class="vs-title">Ganancia total realizada</div>
      <div class="vs-value" style="color:${totalGain >= 0 ? 'var(--green)' : 'var(--red)'}">${totalGain >= 0 ? '+' : ''}${fmt(totalGain)}</div>
    </div>
    <div class="ventas-list">`;

  if (sold.length === 0) {
    html += `<div class="empty-state"><i class="ti ti-receipt"></i><h3>Sin ventas aún</h3><p>Aquí aparecerán los relojes<br>que hayas vendido.</p></div>`;
  } else {
    html += sold.map(w => {
      const gain = (Number(w.soldPrice)||0) - (Number(w.price)||0);
      return `<div class="venta-card">
        <div class="venta-header">
          <div class="venta-name">${w.brand} ${w.model}</div>
          <div class="venta-gain ${gain >= 0 ? 'pos' : 'neg'}">${gain >= 0 ? '+' : ''}${fmt(gain)}</div>
        </div>
        <div class="venta-meta">Comprado: ${fmt(w.price)} · Vendido: ${fmt(w.soldPrice)}${w.soldDate ? ' · ' + w.soldDate : ''}</div>
      </div>`;
    }).join('');
  }
  html += '</div>';
  document.getElementById('ventas-content').innerHTML = html;
}

  document.getElementById('photo-preview').style.display = 'none';

  document.getElementById('f-model').value = w.model || '';
  document.getElementById('f-ref').value = w.ref || '';
  document.getElementById('f-year').value = w.year || '';
  document.getElementById('f-size').value = w.size || '';
  document.getElementById('f-movement').value = w.movement || '';
  document.getElementById('f-crystal').value = w.crystal || '';
  document.getElementById('f-water').value = w.water || '';
  document.getElementById('f-strap').value = w.strap || '';
  document.getElementById('f-price').value = w.price || '';
  document.getElementById('f-value').value = w.value || '';
  document.getElementById('f-origin').value = w.origin || '';
  document.getElementById('f-notes').value = w.notes || '';
  document.getElementById('f-axstyle').value = w.axStyle || '';
  document.getElementById('f-axorigin').value = w.axOrigin || '';
  document.getElementById('f-axmov').value = w.axMov || '';
  document.getElementById('f-status').value = w.status || 'uso';
  document.getElementById('f-sold-price').value = w.soldPrice || '';

    document.getElementById('photo-preview').style.display = 'none';
  }

}

document.getElementById('f-status').addEventListener('change', e => {
  document.getElementById('f-sold-group').style.display = e.target.value === 'vendido' ? 'block' : 'none';
});

function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingPhotoData = ev.target.result;
    document.getElementById('photo-preview').src = pendingPhotoData;
    document.getElementById('photo-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function saveWatch() {
  const brand = document.getElementById('f-brand').value.trim();
  const model = document.getElementById('f-model').value.trim();
  if (!brand && !model) { showToast('Añade al menos marca o modelo'); return; }

  const data = {
    id: editingWatchId || Date.now().toString(),
    brand, model,
    ref: document.getElementById('f-ref').value.trim(),
    year: document.getElementById('f-year').value,
    size: document.getElementById('f-size').value,
    movement: document.getElementById('f-movement').value.trim(),
    crystal: document.getElementById('f-crystal').value.trim(),
    water: document.getElementById('f-water').value.trim(),
    strap: document.getElementById('f-strap').value.trim(),
    price: document.getElementById('f-price').value,
    value: document.getElementById('f-value').value,
    origin: document.getElementById('f-origin').value.trim(),
    axStyle: document.getElementById('f-axstyle').value,
    axOrigin: document.getElementById('f-axorigin').value,
    axMov: document.getElementById('f-axmov').value,
    status: document.getElementById('f-status').value,
    soldPrice: document.getElementById('f-sold-price').value,
    soldDate: document.getElementById('f-sold-date').value,
    notes: document.getElementById('f-notes').value.trim(),
    photo: pendingPhotoData,
    fav: editingWatchId ? (watches.find(w => w.id === editingWatchId)?.fav || false) : false,
    addedAt: editingWatchId ? (watches.find(w => w.id === editingWatchId)?.addedAt || Date.now()) : Date.now()
  };

  if (editingWatchId) {
    watches = watches.map(w => w.id === editingWatchId ? data : w);
    showToast('Reloj actualizado');
  } else {
    watches.push(data);
    showToast('Reloj añadido a la colección');
  }
  saveData('gandela_watches', watches);
  closeModal('modal-watch');
  if (editingWatchId) renderDetail(editingWatchId);
  else { showScreen('coll', document.querySelector('[data-screen="coll"]')); }
}

function deleteCurrentWatch() {
  if (!confirm('¿Eliminar este reloj?')) return;
  watches = watches.filter(w => w.id !== currentWatchId);
  saveData('gandela_watches', watches);
  goBack();
  showToast('Reloj eliminado');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

function fmt(n) {
  const num = Number(n);
  if (isNaN(num) || num === 0) return '—';
  return num.toLocaleString('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

const DATA_VERSION = 2;

function parseValueMid(str) {
  if (!str) return '';
  const s = String(str).split('(')[0];
  const toks = s.match(/\d[\d.,]*/g) || [];
  const nums = toks.map(t => parseFloat(t.replace(/\./g,'').replace(',','.'))).filter(n => !isNaN(n));
  if (!nums.length) return '';
  if (nums.length === 1) return Math.round(nums[0]);
  return Math.round((nums[0] + nums[1]) / 2);
}

function classify(r) {
  const grupo = r.grupo || '';
  const tipo = (r.tipologia || '').toLowerCase();
  const mt = ((r.movimiento && r.movimiento.tipo) || '').toLowerCase();
  // Eje C — movimiento
  let mov = '';
  if (mt.includes('digital') || mt.includes('ana-digi') || mt.includes('anadigi')) mov = 'Digital';
  else if (mt.includes('autom')) mov = 'Automático';
  else if (mt.includes('manual')) mov = 'Manual';
  else if (mt.includes('cuarzo') || mt.includes('quartz') || mt.includes('mecaquartz') || mt.includes('solar') || mt.includes('eco')) mov = 'Cuarzo';
  // Eje A — estilo (sin digital)
  let style;
  if (grupo === 'Casio') style = 'Deportivo casual';
  else if (tipo.includes('diver') || tipo.includes('buceo')) style = 'Diver';
  else if (tipo.includes('gmt') || tipo.includes('piloto') || tipo.includes('world')) style = 'Piloto/GMT';
  else if (tipo.includes('crono')) style = 'Cronógrafo';
  else if (tipo.includes('dress') || tipo.includes('vestir')) style = 'Vestir';
  else if (tipo.includes('field') || tipo.includes('militar')) style = 'Field/Militar';
  else style = 'Deportivo casual';
  // Eje B — origen / naturaleza
  let origin;
  const b = (r.marca || '').toLowerCase();
  if (grupo === 'RSWC') origin = 'RSWC';
  else if (grupo === 'Casio') origin = 'Japonés';
  else if (['rolex','oris','hamilton','longines','breitling'].includes(b)) origin = 'Suizo / consolidada';
  else if (['citizen','seiko'].includes(b)) origin = 'Japonés';
  else if (['addiesdive','heimdallr','boderry'].includes(b)) origin = 'Microbrand / Homenaje';
  else if (b.includes('vostok') || b.includes('seagull')) origin = 'Soviético / Vintage';
  else if (['neckmarine','lotus','viceroy'].includes(b)) origin = 'Español / Rareza';
  else if (b.includes('swatch') || b.includes('skagen')) origin = 'Fashion / Lifestyle';
  else origin = 'Otros';
  return { axStyle: style, axOrigin: origin, axMov: mov };
}

function buildMovementStr(m) {
  if (!m) return '';
  if (typeof m === 'string') return m;
  const parts = [];
  if (m.tipo) parts.push(m.tipo);
  if (m.calibre) parts.push(m.calibre);
  if (m.frecuencia_alt_h) parts.push(m.frecuencia_alt_h + ' alt/h');
  if (m.reserva_marcha_h) parts.push(m.reserva_marcha_h + 'h reserva');
  if (m.notas) parts.push(m.notas);
  return parts.join(' · ');
}

function normalizeWatch(r) {
  // already app-schema? (has brand) → pass through
  if (r.brand !== undefined && r.marca === undefined) return r;
  const diam = r.diametro_mm;
  let size = '', sizeNote = '';
  if (typeof diam === 'number') size = String(diam);
  else if (typeof diam === 'string') {
    if (/x/i.test(diam)) { size = ''; sizeNote = diam; }
    else {
      const mm = diam.match(/\d+[.,]?\d*/);
      size = mm ? mm[0].replace(',', '.') : '';
      if (/[a-zA-ZÀ-ÿ]/.test(diam)) sizeNote = diam;
    }
  }
  let notes = r.historia || '';
  if (sizeNote) notes += (notes ? '\n\n' : '') + 'Medidas: ' + sizeNote;
  if (r.datos_pendientes && r.datos_pendientes.length) notes += (notes ? '\n\n' : '') + '⚠️ Pendiente: ' + r.datos_pendientes.join('; ');
  const ax = classify(r);
  return {
    id: String(r.id),
    brand: r.marca || '',
    model: r.modelo || '',
    ref: r.referencia || '',
    year: r['año'] || '',
    size: size,
    movement: buildMovementStr(r.movimiento),
    crystal: r.cristal || '',
    water: r.estanqueidad || '',
    strap: r.correa || '',
    price: (r.precio_compra == null ? '' : r.precio_compra),
    value: parseValueMid(r.valor_actual_eur),
    valueRange: r.valor_actual_eur || '',
    origin: '',
    status: 'uso',
    soldPrice: '', soldDate: '',
    notes: notes,
    photo: null,
    fav: (String(r.marca).toLowerCase() === 'rolex'),
    grupo: r.grupo || '',
    axStyle: ax.axStyle, axOrigin: ax.axOrigin, axMov: ax.axMov,
    addedAt: Number(r.id) || Date.now()
  };
}

function buildSeed() { return SEED_RAW.map(normalizeWatch); }

function initData() {
  const v = Number(localStorage.getItem('gandela_dataver') || '0');
  if (watches.length === 0 || v < DATA_VERSION) {
    watches = buildSeed();
    saveData('gandela_watches', watches);
    localStorage.setItem('gandela_dataver', String(DATA_VERSION));
  }
}

// ══════════════════════════════════════════
// EXPORT / IMPORT (copia de seguridad y carga)
// ══════════════════════════════════════════
function exportData() {
  const payload = { coleccion: 'Gandela', exportado: new Date().toISOString(), watches, wishlist };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gandela_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Copia exportada');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      let incoming = [];
      if (Array.isArray(parsed)) incoming = parsed;
      else if (parsed.watches) { incoming = parsed.watches; if (parsed.wishlist) { wishlist = parsed.wishlist; saveData('gandela_wish', wishlist); } }
      else if (parsed.relojes) incoming = parsed.relojes;
      else { showToast('Formato no reconocido'); return; }
      const normalized = incoming.map(normalizeWatch);
      if (!confirm('¿Reemplazar la colección actual por ' + normalized.length + ' relojes del archivo? (Tu copia actual se sobrescribe)')) return;
      watches = normalized;
      saveData('gandela_watches', watches);
      localStorage.setItem('gandela_dataver', String(DATA_VERSION));
      showScreen('dash', document.querySelector('[data-screen="dash"]'));
      showToast(normalized.length + ' relojes importados');
    } catch (err) {
      showToast('Error al leer el archivo');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
initData();
renderDash();
</script>
