<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>
(function() {
  const PIN = '160724';
  const KEY = 'gandela_auth';
  const SESSION_HOURS = 24;
  function isAuthed() {
    const d = localStorage.getItem(KEY);
    if (!d) return false;
    try { return Date.now() - JSON.parse(d).ts < SESSION_HOURS * 3600000; } catch { return false; }
  }
  if (!isAuthed()) {
    document.addEventListener('DOMContentLoaded', function() {
      const overlay = document.createElement('div');
      overlay.id = 'pin-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:#1a1416;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:0;font-family:Inter,sans-serif';
      overlay.innerHTML = `
        <div style="font-family:Cormorant Garamond,serif;font-size:28px;font-weight:300;letter-spacing:0.18em;color:#e0b4a0;text-transform:uppercase;margin-bottom:6px">Gandela</div>
        <div style="font-size:9px;letter-spacing:0.25em;color:#5a4548;text-transform:uppercase;margin-bottom:48px">Watch Collection</div>
        <div style="display:flex;gap:14px;margin-bottom:32px" id="pin-dots">
          ${[0,1,2,3,4,5].map(i=>`<div id="dot-${i}" style="width:10px;height:10px;border-radius:50%;background:#2f2529;transition:background 0.15s"></div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,72px);gap:12px">
          ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`
            <button onclick="pinKey('${k}')" style="width:72px;height:72px;border-radius:50%;background:${k===''?'transparent':'#221a1d'};border:${k===''?'none':'0.5px solid #2f2529'};color:#f0e6e8;font-size:22px;font-family:Inter,sans-serif;cursor:${k===''?'default':'pointer'};transition:background 0.15s"
            ${k===''?'disabled':''} onmousedown="this.style.background='#2b2226'" onmouseup="this.style.background='#221a1d'">${k}</button>`).join('')}
        </div>
        <div id="pin-error" style="color:#c97070;font-size:12px;margin-top:20px;opacity:0;transition:opacity 0.2s">PIN incorrecto</div>`;
      document.body.appendChild(overlay);
      window._pinEntry = '';
      window.pinKey = function(k) {
        if (k === '') return;
        if (k === '⌫') { window._pinEntry = window._pinEntry.slice(0,-1); }
        else if (window._pinEntry.length < 6) { window._pinEntry += k; }
        const dots = document.querySelectorAll('[id^="dot-"]');
        dots.forEach((d,i) => d.style.background = i < window._pinEntry.length ? '#c9a063' : '#2f2529');
        if (window._pinEntry.length === 6) {
          if (window._pinEntry === PIN) {
            localStorage.setItem(KEY, JSON.stringify({ts: Date.now()}));
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.3s';
            setTimeout(() => overlay.remove(), 300);
          } else {
            document.getElementById('pin-error').style.opacity = '1';
            setTimeout(() => {
              window._pinEntry = '';
              dots.forEach(d => d.style.background = '#2f2529');
              document.getElementById('pin-error').style.opacity = '0';
            }, 800);
          }
        }
      };
    });
  }
})();
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1416">
<title>Gandela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #1a1416;
    --bg2: #221a1d;
    --bg3: #2b2226;
    --border: #2f2529;
    --border2: #3a2e32;
    --gold: #c9a063;
    --gold-light: #e0c896;
    --rose: #e0b4a0;
    --rose-dark: #c49080;
    --text: #f0e6e8;
    --text2: #c8bbbf;
    --text3: #a08589;
    --text4: #7a6164;
    --text5: #5a4548;
    --green: #7aab6e;
    --red: #c97070;
    --radius: 16px;
    --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; overflow: hidden; }

  /* ── APP SHELL ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }

  /* ── SCREENS ── */
  .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── TOPBAR ── */
  .topbar {
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300; letter-spacing: 0.16em;
    color: var(--rose); text-transform: uppercase;
  }
  .topbar-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 20px; cursor: pointer; border-radius: 50%; transition: background 0.15s; }
  .topbar-icon:hover { background: var(--bg3); }
  .topbar-back { display: flex; align-items: center; gap: 6px; color: var(--gold); font-size: 13px; cursor: pointer; }
  .topbar-back i { font-size: 18px; }

  /* ── SCROLLABLE BODY ── */
  .scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    display: flex; border-top: 0.5px solid var(--border);
    padding: 10px 10px calc(var(--safe-bottom) + 10px);
    flex-shrink: 0; background: var(--bg); gap: 8px;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 6px 9px; cursor: pointer; color: var(--text4);
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; gap: 5px;
    border-radius: 14px; background: transparent;
    transition: all 0.18s;
  }
  .nav-item i { font-size: 22px; }
  .nav-item.active {
    background: linear-gradient(135deg, var(--rose), var(--gold));
    color: #1a1416;
  }

  /* ── DASHBOARD ── */
  .dash-body { padding: 20px 18px 24px; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .kpi-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
  .kpi-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text4); margin-bottom: 6px; }
  .kpi-value { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; line-height: 1; }
  .kpi-value.gold { color: var(--gold); }
  .kpi-value.rose { color: var(--rose); }
  .kpi-value.green { color: var(--green); }
  .kpi-delta { font-size: 10px; color: var(--green); margin-top: 4px; }
  .section-title {
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--gold); margin: 20px 0 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

  /* ── BRAND BARS ── */
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bar-label { width: 62px; font-size: 11px; color: var(--text3); text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--gold), var(--rose)); }
  .bar-count { font-size: 11px; color: var(--text5); width: 18px; text-align: right; flex-shrink: 0; }

  /* ── DONUT ── */
  .donut-row { display: flex; gap: 16px; align-items: center; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── STATUS PILLS ── */
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .status-pill { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .status-label { font-size: 11px; color: var(--text3); }
  .status-num { margin-left: auto; font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--text); }

  /* ── COLLECTION GRID ── */
  .coll-header { padding: 16px 18px 8px; }
  .coll-hero { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; line-height: 1.15; }
  .coll-hero em { font-style: italic; color: var(--rose); }
  .coll-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text4); margin-top: 6px; }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 8px; padding: 10px 18px; overflow-x: auto; flex-shrink: 0; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 11px; letter-spacing: 0.06em; border: 0.5px solid var(--border2); color: var(--text4); background: transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .filter-chip.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

  /* ── WATCH GRID ── */
  .watch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 4px 18px 100px; }
  .watch-card {
    background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius);
    padding: 12px 12px 14px; cursor: pointer; transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .watch-card:active { transform: scale(0.97); }
  .watch-card:hover { border-color: var(--border2); }
  .card-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 500; line-height: 1.15; color: var(--text); text-align: center; min-height: 36px; display: flex; align-items: center; justify-content: center; }
  .card-price { font-size: 10px; letter-spacing: 0.06em; color: var(--gold); text-align: center; margin-top: 2px; margin-bottom: 10px; }
  .card-photo {
    aspect-ratio: 1; border-radius: 10px;
    background: radial-gradient(circle at 50% 38%, #38292c 0%, #1c1517 75%);
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .card-photo .no-photo { color: var(--text5); font-size: 28px; }
  .card-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 20px; font-weight: 500;
  }
  .badge-venta { background: rgba(201,160,99,0.15); color: #e0b48f; border: 0.5px solid rgba(201,160,99,0.4); }
  .badge-guardado { background: rgba(90,69,72,0.3); color: var(--text3); border: 0.5px solid var(--text5); }
  .badge-vendido { background: rgba(122,107,110,0.2); color: var(--text4); border: 0.5px solid var(--text5); }
  .card-fav { position: absolute; bottom: 10px; left: 10px; width: 26px; height: 26px; border-radius: 50%; background: rgba(26,20,22,0.8); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; color: var(--text5); font-size: 13px; transition: color 0.15s; }
  .card-fav.on { color: var(--rose); }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: calc(70px + var(--safe-bottom) + 16px); right: 20px;
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    border: none; color: var(--bg); font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 0 0 6px rgba(224,180,160,0.1);
    transition: transform 0.15s;
    z-index: 100;
  }
  .fab:active { transform: scale(0.93); }

  /* ── DETAIL SCREEN ── */
  .detail-photo {
    margin: 0 18px 0;
    aspect-ratio: 1.05; border-radius: 18px;
    background: radial-gradient(circle at 50% 36%, #3a2a2d 0%, #1c1517 78%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .detail-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
  .detail-photo .no-photo-lg { color: var(--text5); font-size: 60px; }
  .detail-fav { position: absolute; bottom: 14px; left: 14px; width: 32px; height: 32px; border-radius: 50%; background: rgba(26,20,22,0.85); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; color: var(--rose); font-size: 15px; cursor: pointer; }
  .photo-dots { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
  .photo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text5); }
  .photo-dot.on { background: var(--rose); width: 14px; border-radius: 3px; }

  .detail-body { padding: 20px 20px 120px; }
  .detail-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; line-height: 1.12; }
  .detail-price { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--gold); margin-top: 4px; }
  .detail-market { font-size: 11px; color: var(--text4); margin-top: 3px; }
  .detail-market b { color: var(--rose); font-weight: 500; }
  .detail-story { font-size: 13px; line-height: 1.7; color: var(--text3); margin-top: 16px; }
  .spec-row { display: flex; justify-content: space-between; padding: 9px 0; font-size: 12px; border-bottom: 0.5px solid #241c1f; }
  .spec-k { color: var(--text4); }
  .spec-v { color: var(--text2); font-weight: 500; }

  /* ── TIMELINE ── */
  .tl-item { display: flex; gap: 12px; padding: 8px 0; }
  .tl-dot-wrap { display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 4px; }
  .tl-line { flex: 1; width: 1px; background: var(--border2); min-height: 20px; margin-top: 4px; }
  .tl-date { font-size: 10px; color: var(--text4); }
  .tl-text { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .tl-text b { color: var(--rose); font-weight: 500; }

  /* ── STATUS SELECTOR ── */
  .status-sel { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .status-btn { padding: 6px 14px; border-radius: 20px; font-size: 11px; border: 0.5px solid var(--border2); color: var(--text4); background: transparent; cursor: pointer; transition: all 0.15s; }
  .status-btn.sel-uso { border-color: var(--green); color: var(--green); background: rgba(122,171,110,0.1); }
  .status-btn.sel-guardado { border-color: var(--text5); color: var(--text3); background: rgba(90,69,72,0.15); }
  .status-btn.sel-venta { border-color: var(--gold); color: var(--gold); background: rgba(201,160,99,0.1); }
  .status-btn.sel-vendido { border-color: var(--text5); color: var(--text5); background: rgba(90,69,72,0.1); }

  /* ── DETAIL ACTIONS ── */
  .detail-actions {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 14px 18px calc(var(--safe-bottom) + 16px);
    background: linear-gradient(180deg, transparent, var(--bg) 30%);
    display: flex; gap: 10px; z-index: 50;
  }
  .action-btn { flex: 1; padding: 14px; border-radius: 30px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; border: none; font-family: 'Inter', sans-serif; transition: opacity 0.15s; }
  .action-btn:active { opacity: 0.75; }
  .action-ghost { background: transparent; border: 0.5px solid var(--border2); color: var(--rose); }
  .action-solid { background: linear-gradient(135deg, var(--rose), var(--gold)); color: var(--bg); }

  /* ── MODAL / FORM ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--bg2); border-radius: 24px 24px 0 0;
    width: 100%; max-height: 90vh; overflow-y: auto;
    padding: 0 0 calc(var(--safe-bottom) + 20px);
    border-top: 0.5px solid var(--border2);
  }
  .modal-sheet::-webkit-scrollbar { display: none; }
  .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border2); margin: 12px auto 6px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; padding: 8px 20px 16px; color: var(--text); border-bottom: 0.5px solid var(--border); }
  .form-body { padding: 16px 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg3); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); padding: 12px 14px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.15s;
    -webkit-appearance: none; appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
  .form-textarea { min-height: 80px; resize: none; line-height: 1.5; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-submit { width: 100%; padding: 15px; border-radius: 30px; background: linear-gradient(135deg, var(--rose), var(--gold)); color: var(--bg); font-size: 14px; font-weight: 500; border: none; cursor: pointer; margin-top: 8px; font-family: 'Inter', sans-serif; }
  .photo-upload { width: 100%; aspect-ratio: 2; border: 0.5px dashed var(--border2); border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: var(--text4); font-size: 12px; }
  .photo-upload i { font-size: 28px; color: var(--text5); }
  .photo-upload input { display: none; }

  /* ── WISHLIST ── */
  .wish-list { padding: 8px 18px 100px; }
  .wish-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.15s; }
  .wish-card:hover { border-color: var(--border2); }
  .wish-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--text5); font-size: 20px; flex-shrink: 0; }
  .wish-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; color: var(--text); }
  .wish-target { font-size: 11px; color: var(--gold); margin-top: 2px; }
  .wish-notes { font-size: 11px; color: var(--text4); margin-top: 2px; }
  .wish-arrow { margin-left: auto; color: var(--text5); font-size: 18px; }

  /* ── VENTAS ── */
  .ventas-list { padding: 8px 18px 100px; }
  .venta-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .venta-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .venta-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; }
  .venta-gain { font-size: 13px; font-weight: 500; }
  .venta-gain.pos { color: var(--green); }
  .venta-gain.neg { color: var(--red); }
  .venta-meta { font-size: 11px; color: var(--text4); margin-top: 4px; }
  .ventas-summary { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin: 0 18px 16px; }
  .vs-title { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text4); margin-bottom: 8px; }
  .vs-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--green); }

  /* ── EMPTY STATE ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 30px; text-align: center; gap: 12px; }
  .empty-state i { font-size: 48px; color: var(--text5); }
  .empty-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--text3); }
  .empty-state p { font-size: 13px; color: var(--text4); line-height: 1.6; }

  /* ── TOAST ── */
  .toast { position: fixed; top: calc(var(--safe-top) + 60px); left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 20px; padding: 10px 18px; font-size: 13px; color: var(--text2); opacity: 0; transition: all 0.25s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- ══ SCREEN: DASHBOARD ══ -->
  <div class="screen active" id="screen-dash">
    <div class="topbar">
      <div class="topbar-brand">Gandela</div>
      <div class="topbar-icon" onclick="openAddWatch()"><i class="ti ti-plus"></i></div>
    </div>
    <div class="scroll-body">
      <div class="dash-body" id="dash-body"></div>
    </div>
  </div>

  <!-- ══ SCREEN: COLLECTION ══ -->
  <div class="screen" id="screen-coll">
    <div class="topbar">
      <div class="topbar-brand">Gandela</div>
      <div class="topbar-icon" onclick="openAddWatch()"><i class="ti ti-plus"></i></div>
    </div>
    <div class="coll-header">
      <div class="coll-hero">Tu <em>colección</em>,<br>tu historia</div>
      <div class="coll-sub" id="coll-sub">0 piezas</div>
    </div>
    <div class="filter-bar" id="filter-bar">
      <div class="filter-chip active" data-filter="all">Todas</div>
      <div class="filter-chip" data-filter="uso">En uso</div>
      <div class="filter-chip" data-filter="guardado">Guardadas</div>
      <div class="filter-chip" data-filter="venta">En venta</div>
      <div class="filter-chip" data-filter="vendido">Vendidas</div>
    </div>
    <div class="scroll-body">
      <div class="watch-grid" id="watch-grid"></div>
    </div>
    <button class="fab" onclick="openAddWatch()"><i class="ti ti-plus"></i></button>
  </div>

  <!-- ══ SCREEN: DETAIL ══ -->
  <div class="screen" id="screen-detail">
    <div class="topbar">
      <div class="topbar-back" onclick="goBack()"><i class="ti ti-arrow-left"></i> Colección</div>
      <div style="display:flex;gap:4px;align-items:center">
        <div class="topbar-icon" onclick="editCurrentWatch()"><i class="ti ti-edit"></i></div>
        <div class="topbar-icon" onclick="deleteCurrentWatch()"><i class="ti ti-trash"></i></div>
        <div class="topbar-icon" onclick="goBack()" style="width:34px;height:34px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px;margin-left:2px"><i class="ti ti-x"></i></div>
      </div>
    </div>
    <div class="scroll-body" id="detail-scroll">
      <div id="detail-content"></div>
    </div>
    <div class="detail-actions" id="detail-actions"></div>
  </div>

  <!-- ══ SCREEN: WISHLIST ══ -->
  <div class="screen" id="screen-wish">
    <div class="topbar">
      <div class="topbar-brand">Gandela</div>
      <div class="topbar-icon" onclick="openAddWish()"><i class="ti ti-plus"></i></div>
    </div>
    <div class="scroll-body">
      <div style="padding:16px 18px 8px">
        <div class="coll-hero">Lista de <em>deseos</em></div>
        <div class="coll-sub" id="wish-sub">0 piezas</div>
      </div>
      <div class="wish-list" id="wish-list"></div>
    </div>
    <button class="fab" onclick="openAddWish()"><i class="ti ti-plus"></i></button>
  </div>

  <!-- ══ SCREEN: VENTAS ══ -->
  <div class="screen" id="screen-ventas">
    <div class="topbar">
      <div class="topbar-brand">Gandela</div>
    </div>
    <div class="scroll-body">
      <div style="padding:16px 18px 8px">
        <div class="coll-hero">Historial de <em>ventas</em></div>
      </div>
      <div id="ventas-content"></div>
    </div>
  </div>

  <!-- ══ BOTTOM NAV ══ -->
  <nav class="bottom-nav">
    <div class="nav-item active" data-screen="dash" onclick="showScreen('dash',this)">
      <i class="ti ti-chart-bar"></i>Dashboard
    </div>
    <div class="nav-item" data-screen="coll" onclick="showScreen('coll',this)">
      <i class="ti ti-watch"></i>Colección
    </div>
    <div class="nav-item" data-screen="wish" onclick="showScreen('wish',this)">
      <i class="ti ti-heart"></i>Wishlist
    </div>
    <div class="nav-item" data-screen="ventas" onclick="showScreen('ventas',this)">
      <i class="ti ti-receipt"></i>Ventas
    </div>
  </nav>
</div>

<!-- ══ MODAL: ADD/EDIT WATCH ══ -->
<div class="modal-overlay" id="modal-watch">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-watch-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>Añadir reloj</span>
      <div onclick="closeModal('modal-watch')" style="width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:17px;flex-shrink:0"><i class="ti ti-x"></i></div>
    </div>
    <div class="form-body">
      <div class="form-group">
        <label class="form-label">Foto</label>
        <div class="photo-upload" onclick="document.getElementById('photo-input').click()">
          <i class="ti ti-camera"></i>
          <span>Toca para añadir foto</span>
          <input type="file" id="photo-input" accept="image/*" onchange="handlePhotoUpload(event)">
        </div>
        <img id="photo-preview" src="" style="display:none;width:100%;border-radius:10px;margin-top:8px;max-height:180px;object-fit:cover">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Marca</label>
          <input class="form-input" id="f-brand" placeholder="Rolex">
        </div>
        <div class="form-group">
          <label class="form-label">Modelo</label>
          <input class="form-input" id="f-model" placeholder="Submariner">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Referencia</label>
        <input class="form-input" id="f-ref" placeholder="116610LV">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Año</label>
          <input class="form-input" id="f-year" type="number" placeholder="2018">
        </div>
        <div class="form-group">
          <label class="form-label">Diámetro (mm)</label>
          <input class="form-input" id="f-size" type="number" placeholder="40">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Movimiento</label>
        <input class="form-input" id="f-movement" placeholder="Cal. 3235 automático">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cristal</label>
          <input class="form-input" id="f-crystal" placeholder="Zafiro">
        </div>
        <div class="form-group">
          <label class="form-label">Estanqueidad</label>
          <input class="form-input" id="f-water" placeholder="300 m">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Correa / Brazalete</label>
        <input class="form-input" id="f-strap" placeholder="Oyster acero">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Precio compra (€)</label>
          <input class="form-input" id="f-price" type="number" placeholder="8500">
        </div>
        <div class="form-group">
          <label class="form-label">Valor actual (€)</label>
          <input class="form-input" id="f-value" type="number" placeholder="11000">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Dónde / cuándo comprado</label>
        <input class="form-input" id="f-origin" placeholder="Joyería X · Madrid · 2018">
      </div>
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-select" id="f-status">
          <option value="uso">En uso</option>
          <option value="guardado">Guardado</option>
          <option value="venta">En venta</option>
          <option value="vendido">Vendido</option>
        </select>
      </div>
      <div class="form-group" id="f-sold-group" style="display:none">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Precio venta (€)</label>
            <input class="form-input" id="f-sold-price" type="number">
          </div>
          <div class="form-group">
            <label class="form-label">Fecha venta</label>
            <input class="form-input" id="f-sold-date" type="date">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Historia / notas</label>
        <textarea class="form-textarea" id="f-notes" placeholder="Cuéntame la historia de este reloj…"></textarea>
      </div>
      <button class="form-submit" id="form-submit-btn" onclick="saveWatch()">Guardar reloj</button>
      <button style="width:100%;padding:12px;background:transparent;border:none;color:var(--text4);font-size:13px;cursor:pointer;margin-top:8px" onclick="closeModal('modal-watch')">Cancelar</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: ADD WISH ══ -->
<div class="modal-overlay" id="modal-wish">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>Añadir a Wishlist</span>
      <div onclick="closeModal('modal-wish')" style="width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:17px;flex-shrink:0"><i class="ti ti-x"></i></div>
    </div>
    <div class="form-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Marca</label>
          <input class="form-input" id="w-brand" placeholder="Omega">
        </div>
        <div class="form-group">
          <label class="form-label">Modelo</label>
          <input class="form-input" id="w-model" placeholder="Speedmaster">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Referencia</label>
        <input class="form-input" id="w-ref" placeholder="310.30.42.50.01.001">
      </div>
      <div class="form-group">
        <label class="form-label">Precio objetivo (€)</label>
        <input class="form-input" id="w-target" type="number" placeholder="6500">
      </div>
      <div class="form-group">
        <label class="form-label">Notas</label>
        <textarea class="form-textarea" id="w-notes" placeholder="Dónde lo has visto, vendedor, etc."></textarea>
      </div>
      <button class="form-submit" onclick="saveWish()">Añadir a la lista</button>
      <button style="width:100%;padding:12px;background:transparent;border:none;color:var(--text4);font-size:13px;cursor:pointer;margin-top:8px" onclick="closeModal('modal-wish')">Cancelar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// DATA LAYER
// ══════════════════════════════════════════
function loadData(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function saveData(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

let watches = loadData('gandela_watches', []);
let wishlist = loadData('gandela_wish', []);
let currentWatchId = null;
let editingWatchId = null;
let currentFilter = 'all';
let pendingPhotoData = null;

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function showScreen(name, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'dash') renderDash();
  if (name === 'coll') renderCollection();
  if (name === 'wish') renderWishlist();
  if (name === 'ventas') renderVentas();
}

function showDetail(id) {
  currentWatchId = id;
  renderDetail(id);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-detail').classList.add('active');
  document.getElementById('detail-scroll').scrollTop = 0;
}

function goBack() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-coll').classList.add('active');
  renderCollection();
}

// ══════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════
function renderDash() {
  const active = watches.filter(w => w.status !== 'vendido');
  const totalInvested = active.reduce((s, w) => s + (Number(w.price) || 0), 0);
  const totalValue = active.reduce((s, w) => s + (Number(w.value) || Number(w.price) || 0), 0);
  const sold = watches.filter(w => w.status === 'vendido');
  const gainRealized = sold.reduce((s, w) => s + ((Number(w.soldPrice) || 0) - (Number(w.price) || 0)), 0);
  const latent = totalValue - totalInvested;

  // brand count
  const brandMap = {};
  active.forEach(w => { if (w.brand) brandMap[w.brand] = (brandMap[w.brand] || 0) + 1; });
  const brands = Object.entries(brandMap).sort((a,b) => b[1]-a[1]).slice(0,5);
  const maxB = brands[0] ? brands[0][1] : 1;

  // type count
  const typeMap = { Sport: 0, Dress: 0, Tool: 0, Vintage: 0, Otros: 0 };
  active.forEach(w => {
    const t = w.type || 'Otros';
    if (typeMap[t] !== undefined) typeMap[t]++; else typeMap['Otros']++;
  });
  const totalTypes = active.length || 1;

  // status count
  const uso = watches.filter(w => w.status === 'uso').length;
  const guardado = watches.filter(w => w.status === 'guardado').length;
  const venta = watches.filter(w => w.status === 'venta').length;
  const vendido = watches.filter(w => w.status === 'vendido').length;

  // donut arcs (circumference ~125.7 for r=20)
  const C = 125.7;
  const types = Object.entries(typeMap).filter(([,v])=>v>0);
  const colors = ['#c9a063','#e0b4a0','#9e7d80','#7a6164','#5a4548'];
  let offset = 0;
  const arcs = types.map(([name, count], i) => {
    const dash = (count / totalTypes) * C;
    const arc = { name, count, dash, offset, color: colors[i] };
    offset += dash;
    return arc;
  });

  document.getElementById('dash-body').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Invertido</div>
        <div class="kpi-value">${fmt(totalInvested)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Valor actual</div>
        <div class="kpi-value gold">${fmt(totalValue)}</div>
        ${latent !== 0 ? `<div class="kpi-delta">${latent >= 0 ? '↑' : '↓'} ${fmt(Math.abs(latent))} latente</div>` : ''}
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Piezas</div>
        <div class="kpi-value">${active.length}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Ganancia realizada</div>
        <div class="kpi-value ${gainRealized >= 0 ? 'green' : ''}">${gainRealized >= 0 ? '+' : ''}${fmt(gainRealized)}</div>
      </div>
    </div>

    ${brands.length > 0 ? `
    <div class="section-title">Por marca</div>
    ${brands.map(([brand, count]) => `
      <div class="bar-row">
        <div class="bar-label">${brand}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxB*100)}%"></div></div>
        <div class="bar-count">${count}</div>
      </div>`).join('')}` : ''}

    ${types.length > 0 ? `
    <div class="section-title">Por tipología</div>
    <div class="donut-row">
      <svg width="84" height="84" viewBox="0 0 84 84" style="flex-shrink:0">
        <circle cx="42" cy="42" r="20" fill="none" stroke="#2b2226" stroke-width="14"/>
        ${arcs.map(a => `<circle cx="42" cy="42" r="20" fill="none" stroke="${a.color}" stroke-width="14"
          stroke-dasharray="${a.dash.toFixed(1)} ${(C-a.dash).toFixed(1)}"
          stroke-dashoffset="${(-a.offset + C/4).toFixed(1)}"/>`).join('')}
        <text x="42" y="47" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="13" fill="#f0e6e8">${active.length}</text>
      </svg>
      <div class="donut-legend">
        ${arcs.map(a => `<div class="legend-item"><div class="legend-dot" style="background:${a.color}"></div>${a.name} — ${Math.round(a.count/totalTypes*100)}%</div>`).join('')}
      </div>
    </div>` : ''}

    <div class="section-title">Estado</div>
    <div class="status-grid">
      <div class="status-pill"><div class="status-dot" style="background:var(--green)"></div><div class="status-label">En uso</div><div class="status-num">${uso}</div></div>
      <div class="status-pill"><div class="status-dot" style="background:var(--text5)"></div><div class="status-label">Guardado</div><div class="status-num">${guardado}</div></div>
      <div class="status-pill"><div class="status-dot" style="background:var(--gold)"></div><div class="status-label">En venta</div><div class="status-num">${venta}</div></div>
      <div class="status-pill"><div class="status-dot" style="background:var(--text5)"></div><div class="status-label">Vendido</div><div class="status-num">${vendido}</div></div>
    </div>
  `;
}

// ══════════════════════════════════════════
// COLLECTION
// ══════════════════════════════════════════
function renderCollection() {
  const filtered = currentFilter === 'all' ? watches.filter(w=>w.status!=='vendido') : watches.filter(w => w.status === currentFilter);
  const total = watches.filter(w=>w.status!=='vendido').length;
  document.getElementById('coll-sub').textContent = `${total} ${total === 1 ? 'pieza' : 'piezas'}`;

  if (filtered.length === 0) {
    document.getElementById('watch-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="ti ti-watch"></i>
        <h3>Sin relojes aún</h3>
        <p>Toca el + para añadir<br>tu primera pieza.</p>
      </div>`;
    return;
  }

  document.getElementById('watch-grid').innerHTML = filtered.map(w => `
    <div class="watch-card" onclick="showDetail('${w.id}')">
      ${w.status === 'venta' ? '<div class="card-badge badge-venta">En venta</div>' : ''}
      ${w.status === 'guardado' ? '<div class="card-badge badge-guardado">Guardado</div>' : ''}
      ${w.status === 'vendido' ? '<div class="card-badge badge-vendido">Vendido</div>' : ''}
      <div class="card-name">${w.brand || ''}<br><span style="font-weight:300;font-style:italic">${w.model || ''}</span></div>
      <div class="card-price">${w.price ? fmt(w.price) : '—'}</div>
      <div class="card-photo">
        ${w.photo ? `<img src="${w.photo}" alt="${w.model}">` : `<i class="ti ti-watch card-no-photo" style="color:var(--text5);font-size:40px"></i>`}
        <div class="card-fav ${w.fav ? 'on' : ''}" onclick="event.stopPropagation();toggleFav('${w.id}')">
          <i class="ti ti-heart"></i>
        </div>
      </div>
    </div>`).join('');
}

// filter chips
document.getElementById('filter-bar').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentFilter = chip.dataset.filter;
  renderCollection();
});

function toggleFav(id) {
  const w = watches.find(w => w.id === id);
  if (w) { w.fav = !w.fav; saveData('gandela_watches', watches); renderCollection(); }
}

// ══════════════════════════════════════════
// DETAIL
// ══════════════════════════════════════════
function renderDetail(id) {
  const w = watches.find(w => w.id === id);
  if (!w) return;
  const latent = (Number(w.value) || 0) - (Number(w.price) || 0);

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-photo">
      ${w.photo ? `<img src="${w.photo}" alt="${w.model}">` : `<i class="ti ti-watch detail-no-photo" style="color:var(--text5);font-size:64px"></i>`}
      <div class="detail-fav" onclick="toggleFav('${w.id}')"><i class="ti ti-heart" style="color:${w.fav ? 'var(--rose)' : 'var(--text4)'}"></i></div>
    </div>
    <div class="detail-body">
      <div class="detail-name">${w.brand || ''}<br>${w.model || ''}</div>
      ${w.price ? `<div class="detail-price">${fmt(w.price)}</div>` : ''}
      ${w.value && latent !== 0 ? `<div class="detail-market">Valor estimado: <b>${fmt(w.value)}</b> · ${latent >= 0 ? '↑' : '↓'} ${fmt(Math.abs(latent))} (${latent >= 0 ? '+' : ''}${Math.round(latent/w.price*100)}%)</div>` : ''}

      ${w.notes ? `<div class="detail-story">${w.notes}</div>` : ''}

      <div class="section-title" style="margin-top:20px">Especificaciones</div>
      ${w.ref ? `<div class="spec-row"><span class="spec-k">Referencia</span><span class="spec-v">${w.ref}</span></div>` : ''}
      ${w.movement ? `<div class="spec-row"><span class="spec-k">Movimiento</span><span class="spec-v">${w.movement}</span></div>` : ''}
      ${w.size ? `<div class="spec-row"><span class="spec-k">Diámetro</span><span class="spec-v">${w.size} mm</span></div>` : ''}
      ${w.crystal ? `<div class="spec-row"><span class="spec-k">Cristal</span><span class="spec-v">${w.crystal}</span></div>` : ''}
      ${w.water ? `<div class="spec-row"><span class="spec-k">Estanqueidad</span><span class="spec-v">${w.water}</span></div>` : ''}
      ${w.strap ? `<div class="spec-row"><span class="spec-k">Correa</span><span class="spec-v">${w.strap}</span></div>` : ''}
      ${w.year ? `<div class="spec-row"><span class="spec-k">Año</span><span class="spec-v">${w.year}</span></div>` : ''}

      ${w.origin ? `
      <div class="section-title">Mi historia</div>
      <div class="tl-item">
        <div class="tl-dot-wrap"><div class="tl-dot"></div><div class="tl-line"></div></div>
        <div><div class="tl-date">Adquisición</div><div class="tl-text">${w.origin}</div></div>
      </div>` : ''}
      ${w.status === 'vendido' && w.soldPrice ? `
      <div class="tl-item">
        <div class="tl-dot-wrap"><div class="tl-dot" style="background:var(--rose)"></div></div>
        <div><div class="tl-date">${w.soldDate || 'Vendido'}</div><div class="tl-text">Vendido por <b>${fmt(w.soldPrice)}</b></div></div>
      </div>` : ''}
    </div>`;

  document.getElementById('detail-actions').innerHTML = `
    <button class="action-btn action-ghost" onclick="changeStatus('${w.id}')">
      <i class="ti ti-refresh" style="margin-right:6px"></i>Estado: ${statusLabel(w.status)}
    </button>
    <button class="action-btn action-solid" onclick="editCurrentWatch()">Editar ficha</button>`;
}

function statusLabel(s) {
  return { uso: 'En uso', guardado: 'Guardado', venta: 'En venta', vendido: 'Vendido' }[s] || s;
}

function changeStatus(id) {
  const w = watches.find(w => w.id === id);
  if (!w) return;
  const order = ['uso', 'guardado', 'venta', 'vendido'];
  const idx = order.indexOf(w.status);
  w.status = order[(idx + 1) % order.length];
  saveData('gandela_watches', watches);
  renderDetail(id);
  showToast(`Estado → ${statusLabel(w.status)}`);
}

// ══════════════════════════════════════════
// WISHLIST
// ══════════════════════════════════════════
function renderWishlist() {
  document.getElementById('wish-sub').textContent = `${wishlist.length} ${wishlist.length === 1 ? 'pieza' : 'piezas'}`;
  if (wishlist.length === 0) {
    document.getElementById('wish-list').innerHTML = `
      <div class="empty-state">
        <i class="ti ti-heart"></i>
        <h3>Tu wishlist está vacía</h3>
        <p>Añade relojes que quieras<br>conseguir algún día.</p>
      </div>`;
    return;
  }
  document.getElementById('wish-list').innerHTML = wishlist.map(w => `
    <div class="wish-card">
      <div class="wish-icon"><i class="ti ti-watch"></i></div>
      <div style="flex:1;min-width:0">
        <div class="wish-name">${w.brand} ${w.model}</div>
        ${w.ref ? `<div class="wish-notes">${w.ref}</div>` : ''}
        ${w.target ? `<div class="wish-target">Objetivo: ${fmt(w.target)}</div>` : ''}
        ${w.notes ? `<div class="wish-notes">${w.notes}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
        <div class="topbar-icon" onclick="moveWishToCollection('${w.id}')" title="Mover a colección" style="font-size:16px;color:var(--green)"><i class="ti ti-circle-plus"></i></div>
        <div class="topbar-icon" onclick="deleteWish('${w.id}')" style="font-size:16px;color:var(--text5)"><i class="ti ti-trash"></i></div>
      </div>
    </div>`).join('');
}

function moveWishToCollection(id) {
  const w = wishlist.find(w => w.id === id);
  if (!w) return;
  wishlist = wishlist.filter(w => w.id !== id);
  saveData('gandela_wish', wishlist);
  // pre-fill add watch form with wish data
  openAddWatch();
  setTimeout(() => {
    document.getElementById('f-brand').value = w.brand || '';
    document.getElementById('f-model').value = w.model || '';
    document.getElementById('f-ref').value = w.ref || '';
    document.getElementById('f-notes').value = w.notes || '';
  }, 100);
  renderWishlist();
  showToast('Rellena los datos de compra');
}

function deleteWish(id) {
  wishlist = wishlist.filter(w => w.id !== id);
  saveData('gandela_wish', wishlist);
  renderWishlist();
  showToast('Eliminado de la wishlist');
}

// ══════════════════════════════════════════
// VENTAS
// ══════════════════════════════════════════
function renderVentas() {
  const sold = watches.filter(w => w.status === 'vendido');
  const totalGain = sold.reduce((s, w) => s + ((Number(w.soldPrice)||0) - (Number(w.price)||0)), 0);

  let html = `
    <div class="ventas-summary">
      <div class="vs-title">Ganancia total realizada</div>
      <div class="vs-value" style="color:${totalGain >= 0 ? 'var(--green)' : 'var(--red)'}">${totalGain >= 0 ? '+' : ''}${fmt(totalGain)}</div>
    </div>
    <div class="ventas-list">`;

  if (sold.length === 0) {
    html += `<div class="empty-state"><i class="ti ti-receipt"></i><h3>Sin ventas aún</h3><p>Aquí aparecerán los relojes<br>que hayas vendido.</p></div>`;
  } else {
    html += sold.map(w => {
      const gain = (Number(w.soldPrice)||0) - (Number(w.price)||0);
      return `<div class="venta-card">
        <div class="venta-header">
          <div class="venta-name">${w.brand} ${w.model}</div>
          <div class="venta-gain ${gain >= 0 ? 'pos' : 'neg'}">${gain >= 0 ? '+' : ''}${fmt(gain)}</div>
        </div>
        <div class="venta-meta">Comprado: ${fmt(w.price)} · Vendido: ${fmt(w.soldPrice)}${w.soldDate ? ' · ' + w.soldDate : ''}</div>
      </div>`;
    }).join('');
  }
  html += '</div>';
  document.getElementById('ventas-content').innerHTML = html;
}

// FORM: ADD / EDIT WATCH
// ══════════════════════════════════════════
function openAddWatch() {
  editingWatchId = null;
  pendingPhotoData = null;
  document.getElementById('modal-watch-title').textContent = 'Añadir reloj';
  document.getElementById('form-submit-btn').textContent = 'Guardar reloj';
  ['f-brand','f-model','f-ref','f-year','f-size','f-movement','f-crystal','f-water','f-strap','f-price','f-value','f-origin','f-notes','f-sold-price','f-sold-date'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-status').value = 'uso';
  document.getElementById('f-sold-group').style.display = 'none';
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-preview').src = '';
  document.getElementById('modal-watch').classList.add('open');
}

function editCurrentWatch() {
  const w = watches.find(w => w.id === currentWatchId);
  if (!w) return;
  editingWatchId = w.id;
  pendingPhotoData = w.photo || null;
  document.getElementById('modal-watch-title').textContent = 'Editar reloj';
  document.getElementById('form-submit-btn').textContent = 'Actualizar';
  document.getElementById('f-brand').value = w.brand || '';
  document.getElementById('f-model').value = w.model || '';
  document.getElementById('f-ref').value = w.ref || '';
  document.getElementById('f-year').value = w.year || '';
  document.getElementById('f-size').value = w.size || '';
  document.getElementById('f-movement').value = w.movement || '';
  document.getElementById('f-crystal').value = w.crystal || '';
  document.getElementById('f-water').value = w.water || '';
  document.getElementById('f-strap').value = w.strap || '';
  document.getElementById('f-price').value = w.price || '';
  document.getElementById('f-value').value = w.value || '';
  document.getElementById('f-origin').value = w.origin || '';
  document.getElementById('f-notes').value = w.notes || '';
  document.getElementById('f-status').value = w.status || 'uso';
  document.getElementById('f-sold-price').value = w.soldPrice || '';
  document.getElementById('f-sold-date').value = w.soldDate || '';
  document.getElementById('f-sold-group').style.display = w.status === 'vendido' ? 'block' : 'none';
  if (w.photo) {
    document.getElementById('photo-preview').src = w.photo;
    document.getElementById('photo-preview').style.display = 'block';
  } else {
    document.getElementById('photo-preview').style.display = 'none';
  }
  document.getElementById('modal-watch').classList.add('open');
}

document.getElementById('f-status').addEventListener('change', e => {
  document.getElementById('f-sold-group').style.display = e.target.value === 'vendido' ? 'block' : 'none';
});

function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingPhotoData = ev.target.result;
    document.getElementById('photo-preview').src = pendingPhotoData;
    document.getElementById('photo-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function saveWatch() {
  const brand = document.getElementById('f-brand').value.trim();
  const model = document.getElementById('f-model').value.trim();
  if (!brand && !model) { showToast('Añade al menos marca o modelo'); return; }

  const data = {
    id: editingWatchId || Date.now().toString(),
    brand, model,
    ref: document.getElementById('f-ref').value.trim(),
    year: document.getElementById('f-year').value,
    size: document.getElementById('f-size').value,
    movement: document.getElementById('f-movement').value.trim(),
    crystal: document.getElementById('f-crystal').value.trim(),
    water: document.getElementById('f-water').value.trim(),
    strap: document.getElementById('f-strap').value.trim(),
    price: document.getElementById('f-price').value,
    value: document.getElementById('f-value').value,
    origin: document.getElementById('f-origin').value.trim(),
    status: document.getElementById('f-status').value,
    soldPrice: document.getElementById('f-sold-price').value,
    soldDate: document.getElementById('f-sold-date').value,
    notes: document.getElementById('f-notes').value.trim(),
    photo: pendingPhotoData,
    fav: editingWatchId ? (watches.find(w => w.id === editingWatchId)?.fav || false) : false,
    addedAt: editingWatchId ? (watches.find(w => w.id === editingWatchId)?.addedAt || Date.now()) : Date.now()
  };

  if (editingWatchId) {
    watches = watches.map(w => w.id === editingWatchId ? data : w);
    showToast('Reloj actualizado');
  } else {
    watches.push(data);
    showToast('Reloj añadido a la colección');
  }
  saveData('gandela_watches', watches);
  closeModal('modal-watch');
  if (editingWatchId) renderDetail(editingWatchId);
  else { showScreen('coll', document.querySelector('[data-screen="coll"]')); }
}

function deleteCurrentWatch() {
  if (!confirm('¿Eliminar este reloj?')) return;
  watches = watches.filter(w => w.id !== currentWatchId);
  saveData('gandela_watches', watches);
  goBack();
  showToast('Reloj eliminado');
}

function openAddWish() {
  ['w-brand','w-model','w-ref','w-target','w-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal-wish').classList.add('open');
}

function saveWish() {
  const brand = document.getElementById('w-brand').value.trim();
  const model = document.getElementById('w-model').value.trim();
  if (!brand && !model) { showToast('Añade al menos marca o modelo'); return; }
  wishlist.push({ id: Date.now().toString(), brand, model, ref: document.getElementById('w-ref').value.trim(), target: document.getElementById('w-target').value, notes: document.getElementById('w-notes').value.trim() });
  saveData('gandela_wish', wishlist);
  closeModal('modal-wish');
  renderWishlist();
  showToast('Añadido a la wishlist');
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

function fmt(n) {
  const num = Number(n);
  if (isNaN(num) || num === 0) return '—';
  return num.toLocaleString('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
